# FRP Client Configuration Example
# Copy to frpc.toml and fill in your server info

serverAddr = "your-frp-server.com"
serverPort = 7000
auth.method = "token"
auth.token = "your-token-here"
user = "your-username"
loginFailExit = false

# ─── WebSocket 远程中枢 (remote-agent) ───
[[proxies]]
name = "remote-agent"
type = "tcp"
localIP = "127.0.0.1"
localPort = 3002
remotePort = 9001

# ─── PS Agent Relay (ps-agent) ───
[[proxies]]
name = "ps-agent-relay"
type = "tcp"
localIP = "127.0.0.1"
localPort = 9910
remotePort = 9910
