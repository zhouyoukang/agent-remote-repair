# FRP Client Configuration Example
# Copy this file to frpc.toml and fill in your server info

serverAddr = "your-frp-server.com"
serverPort = 7000
# auth.method = "token"
# auth.token = "your-token"
user = "your-username"
loginFailExit = false

[[proxies]]
type = "tcp"
name = "remote-agent"
localIP = "127.0.0.1"
localPort = 3002
remotePort = 9001
# transport.useEncryption = true
# transport.useCompression = true
