<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"
    />
    <title>机械革命14+ 诊断中枢</title>
    <meta
      name="description"
      content="笔记本开机自动关机 - 完整诊断与修复指南"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      body {
        background: #0a0a0f;
        color: #f0f0f5;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
      }
      .app {
        max-width: 32rem;
        margin: 0 auto;
        padding-bottom: 5rem;
      }
      /* Header */
      .hdr {
        position: sticky;
        top: 0;
        z-index: 30;
        background: rgba(10, 10, 15, 0.95);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }
      .hdr-top {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.75rem 1rem 0.5rem;
      }
      .hdr-icon {
        width: 2.25rem;
        height: 2.25rem;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 0.75rem;
        background: #4f46e5;
        font-size: 1rem;
      }
      .hdr-info {
        flex: 1;
        min-width: 0;
      }
      .hdr-info h1 {
        font-size: 1rem;
        font-weight: 700;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .hdr-info p {
        font-size: 0.625rem;
        color: #6b7280;
      }
      .hdr-timer {
        text-align: right;
      }
      .hdr-timer .t {
        font-size: 0.75rem;
        color: #818cf8;
        font-family: "Cascadia Code", monospace;
      }
      .hdr-timer .l {
        font-size: 0.625rem;
        color: #4b5563;
      }
      /* Progress */
      .progress {
        display: flex;
        gap: 2px;
        padding: 0 1rem 0.25rem;
      }
      .progress .bar {
        height: 4px;
        flex: 1;
        border-radius: 9999px;
        background: #1f2937;
        transition: background 0.3s;
      }
      .bar.done-ok {
        background: #22c55e;
      }
      .bar.done-fail {
        background: #ef4444;
      }
      .bar.done-maybe {
        background: #f59e0b;
      }
      .bar.active {
        background: #6366f1;
        animation: pulse 1.5s infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }
      /* Nav */
      .nav {
        display: flex;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
      }
      .nav button {
        flex: 1;
        padding: 0.5rem 0;
        font-size: 0.75rem;
        text-align: center;
        background: none;
        border: none;
        color: #6b7280;
        cursor: pointer;
        transition: all 0.2s;
        border-bottom: 2px solid transparent;
      }
      .nav button.on {
        color: #818cf8;
        background: rgba(99, 102, 241, 0.05);
        border-bottom-color: #6366f1;
      }
      .nav .badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 16px;
        height: 16px;
        margin-left: 4px;
        padding: 0 4px;
        border-radius: 9999px;
        background: #4f46e5;
        font-size: 0.625rem;
        color: #fff;
      }
      /* Content */
      .content {
        padding: 1rem;
      }
      /* Card */
      .card {
        border-radius: 1rem;
        border: 1px solid #1f2937;
        background: #12121a;
        padding: 1rem;
        margin-bottom: 0.75rem;
      }
      .card-accent {
        border-color: rgba(99, 102, 241, 0.3);
        background: rgba(49, 46, 129, 0.2);
      }
      .card-green {
        border-color: rgba(34, 197, 94, 0.3);
        background: rgba(6, 78, 59, 0.2);
      }
      .card-red {
        border-color: rgba(239, 68, 68, 0.1);
        background: rgba(69, 10, 10, 0.2);
      }
      .card-amber {
        border-color: rgba(245, 158, 11, 0.1);
        background: rgba(69, 46, 0, 0.2);
      }
      .card-purple {
        border-color: rgba(168, 85, 247, 0.2);
        background: rgba(88, 28, 135, 0.2);
      }
      .card-cyan {
        border-color: rgba(6, 182, 212, 0.2);
        background: rgba(8, 51, 68, 0.2);
      }
      /* Step header */
      .step-hdr {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin-bottom: 0.5rem;
      }
      .step-hdr .icon {
        font-size: 1.5rem;
      }
      .step-hdr h2 {
        font-size: 1.125rem;
        font-weight: 700;
      }
      .tags {
        display: flex;
        gap: 0.5rem;
        margin-top: 0.25rem;
      }
      .tag {
        display: inline-flex;
        align-items: center;
        padding: 0.125rem 0.5rem;
        border-radius: 9999px;
        background: #1f2937;
        font-size: 0.625rem;
        color: #9ca3af;
      }
      /* Instructions */
      .instr-title {
        font-size: 0.75rem;
        font-weight: 600;
        color: #9ca3af;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 0.5rem;
      }
      .instr p {
        font-size: 0.875rem;
        color: #d1d5db;
        line-height: 1.6;
      }
      .instr p.step-line {
        color: #fff;
      }
      .instr p.indent {
        color: #9ca3af;
        padding-left: 1rem;
      }
      .instr p.empty {
        height: 0.5rem;
      }
      /* Tip/Warning */
      .tip {
        border-radius: 0.75rem;
        padding: 0.75rem;
        margin-bottom: 0.75rem;
      }
      .tip-green {
        background: rgba(6, 78, 59, 0.3);
        border: 1px solid rgba(34, 197, 94, 0.2);
      }
      .tip-green p {
        color: #86efac;
        font-size: 0.875rem;
      }
      .tip-amber {
        background: rgba(69, 46, 0, 0.3);
        border: 1px solid rgba(245, 158, 11, 0.2);
      }
      .tip-amber p {
        color: #fcd34d;
        font-size: 0.875rem;
      }
      /* Photo btn */
      .photo-btn {
        width: 100%;
        border-radius: 0.75rem;
        border: 1px dashed #4b5563;
        background: rgba(17, 24, 39, 0.5);
        padding: 0.75rem;
        font-size: 0.875rem;
        color: #9ca3af;
        cursor: pointer;
        margin-bottom: 0.75rem;
      }
      .photo-btn:active {
        background: #1f2937;
      }
      /* Note input */
      .note-row {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 0.75rem;
      }
      .note-row input {
        flex: 1;
        border-radius: 0.75rem;
        border: 1px solid #374151;
        background: #111827;
        padding: 0.625rem 0.75rem;
        font-size: 0.875rem;
        color: #fff;
        outline: none;
      }
      .note-row input:focus {
        border-color: #6366f1;
      }
      .note-row input::placeholder {
        color: #4b5563;
      }
      .note-row button {
        border-radius: 0.75rem;
        background: #1f2937;
        padding: 0.5rem 0.75rem;
        font-size: 0.875rem;
        color: #d1d5db;
        border: none;
        cursor: pointer;
      }
      /* Question */
      .question {
        font-size: 0.875rem;
        font-weight: 600;
        color: #a5b4fc;
        margin-bottom: 0.75rem;
      }
      .ans-btn {
        width: 100%;
        border-radius: 0.75rem;
        padding: 0.75rem;
        text-align: left;
        font-size: 0.875rem;
        font-weight: 500;
        border: none;
        cursor: pointer;
        margin-bottom: 0.5rem;
        transition: all 0.2s;
      }
      .ans-yes {
        background: rgba(22, 163, 74, 0.2);
        border: 1px solid rgba(34, 197, 94, 0.3);
        color: #86efac;
      }
      .ans-yes:active {
        background: rgba(22, 163, 74, 0.3);
      }
      .ans-no {
        background: rgba(220, 38, 38, 0.2);
        border: 1px solid rgba(239, 68, 68, 0.3);
        color: #fca5a5;
      }
      .ans-no:active {
        background: rgba(220, 38, 38, 0.3);
      }
      .ans-maybe {
        background: rgba(217, 119, 6, 0.2);
        border: 1px solid rgba(245, 158, 11, 0.3);
        color: #fcd34d;
      }
      .ans-maybe:active {
        background: rgba(217, 119, 6, 0.3);
      }
      /* Done */
      .done-box {
        text-align: center;
        padding: 1.5rem;
      }
      .done-box .big {
        font-size: 2.5rem;
        margin-bottom: 0.75rem;
      }
      .done-box h2 {
        font-size: 1.25rem;
        font-weight: 700;
        color: #86efac;
        margin-bottom: 0.5rem;
      }
      .done-box p {
        font-size: 0.875rem;
        color: #d1d5db;
      }
      .done-box .meta {
        font-size: 0.75rem;
        color: #6b7280;
        margin-top: 0.75rem;
      }
      /* Path review */
      .path-item {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.875rem;
        padding: 0.25rem 0;
      }
      .path-dot {
        width: 0.5rem;
        height: 0.5rem;
        border-radius: 9999px;
        flex-shrink: 0;
      }
      .path-dot.ok {
        background: #22c55e;
      }
      .path-dot.fail {
        background: #ef4444;
      }
      .path-dot.maybe {
        background: #f59e0b;
      }
      .path-name {
        color: #d1d5db;
        flex: 1;
      }
      .path-time {
        color: #4b5563;
        font-size: 0.75rem;
      }
      /* Reset */
      .reset-btn {
        width: 100%;
        border-radius: 0.75rem;
        border: 1px solid #374151;
        background: #111827;
        padding: 0.75rem;
        font-size: 0.875rem;
        color: #9ca3af;
        cursor: pointer;
      }
      .reset-btn:active {
        background: #1f2937;
      }
      /* Log */
      .log-hdr {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 0.5rem;
      }
      .log-hdr p {
        font-size: 0.75rem;
        color: #6b7280;
      }
      .log-hdr button {
        font-size: 0.75rem;
        color: #ef4444;
        background: none;
        border: none;
        cursor: pointer;
      }
      .log-entry {
        border-radius: 0.75rem;
        padding: 0.75rem;
        margin-bottom: 0.5rem;
        font-size: 0.875rem;
      }
      .log-entry.sys {
        border: 1px solid rgba(99, 102, 241, 0.2);
        background: rgba(49, 46, 129, 0.1);
      }
      .log-entry.finding {
        border: 1px solid rgba(34, 197, 94, 0.2);
        background: rgba(6, 78, 59, 0.1);
      }
      .log-entry.photo-entry {
        border: 1px solid rgba(168, 85, 247, 0.2);
        background: rgba(88, 28, 135, 0.1);
      }
      .log-entry.note-entry {
        border: 1px solid rgba(245, 158, 11, 0.2);
        background: rgba(69, 46, 0, 0.1);
      }
      .log-entry .meta {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin-bottom: 0.25rem;
      }
      .log-entry .time {
        font-size: 0.625rem;
        color: #6b7280;
        font-family: monospace;
      }
      .log-entry .type-badge {
        font-size: 0.625rem;
        padding: 0.125rem 0.375rem;
        border-radius: 0.25rem;
        background: #1f2937;
        color: #9ca3af;
      }
      .log-entry .step-num {
        font-size: 0.625rem;
        color: #4b5563;
      }
      .log-entry .text {
        color: #d1d5db;
      }
      .log-entry img {
        margin-top: 0.5rem;
        border-radius: 0.5rem;
        max-height: 12rem;
        object-fit: cover;
      }
      .empty-msg {
        text-align: center;
        padding: 3rem 0;
        color: #4b5563;
        font-size: 0.875rem;
      }
      /* Camera */
      .cam-box {
        text-align: center;
      }
      .cam-box .big {
        font-size: 2.5rem;
        margin-bottom: 0.75rem;
      }
      .cam-box h2 {
        font-size: 1.125rem;
        font-weight: 700;
        color: #c084fc;
        margin-bottom: 0.5rem;
      }
      .cam-box .desc {
        font-size: 0.875rem;
        color: #9ca3af;
        margin-bottom: 1rem;
      }
      .cam-btn {
        border-radius: 0.75rem;
        background: #9333ea;
        padding: 0.75rem 2rem;
        font-size: 0.875rem;
        font-weight: 600;
        color: #fff;
        border: none;
        cursor: pointer;
      }
      .cam-btn:active {
        background: #7c3aed;
      }
      .cam-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.5rem;
        margin-top: 1rem;
        text-align: left;
      }
      .cam-grid button {
        border-radius: 0.75rem;
        border: 1px solid #1f2937;
        background: #12121a;
        padding: 0.75rem;
        font-size: 0.875rem;
        color: #d1d5db;
        cursor: pointer;
      }
      .cam-grid button:active {
        background: #1f2937;
      }
      .photo-gallery {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.5rem;
        margin-top: 0.5rem;
      }
      .photo-gallery img {
        border-radius: 0.75rem;
        object-fit: cover;
        height: 8rem;
        width: 100%;
      }
      /* Specs */
      .spec-row {
        display: flex;
        padding: 0.625rem 1rem;
        border-bottom: 1px solid #1f2937;
      }
      .spec-row:last-child {
        border-bottom: none;
      }
      .spec-label {
        font-size: 0.75rem;
        color: #6b7280;
        width: 4rem;
        flex-shrink: 0;
      }
      .spec-val {
        font-size: 0.75rem;
        font-weight: 500;
        color: #fff;
      }
      .issue-card {
        border-radius: 0.75rem;
        padding: 0.75rem;
        margin-bottom: 0.5rem;
      }
      .issue-title {
        font-size: 0.75rem;
        font-weight: 500;
      }
      .issue-desc {
        font-size: 0.6875rem;
        color: #9ca3af;
        margin-top: 0.125rem;
      }
      /* Report */
      .report-field {
        font-size: 0.75rem;
        color: #9ca3af;
      }
      .report-field span {
        color: #fff;
      }
      .report-step {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.375rem 0;
        border-bottom: 1px solid #1f2937;
      }
      .report-step:last-child {
        border-bottom: none;
      }
      .report-step .mark {
        font-size: 0.75rem;
        width: 1rem;
      }
      .report-step .name {
        font-size: 0.75rem;
        flex: 1;
      }
      .report-step .elapsed {
        font-size: 0.625rem;
        color: #4b5563;
      }
      .finding-line {
        font-size: 0.75rem;
        color: #9ca3af;
        padding: 0.25rem 0;
        border-bottom: 1px solid #1f2937;
      }
      .finding-line:last-child {
        border-bottom: none;
      }
      .finding-line .ftime {
        color: #4b5563;
        font-family: monospace;
      }
      /* Animation */
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .fade-in {
        animation: fadeIn 0.4s ease-out;
      }
      /* Hidden */
      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div class="app" id="app">
      <input
        type="file"
        id="fileInput"
        accept="image/*"
        capture="environment"
        class="hidden"
      />

      <!-- Header -->
      <div class="hdr">
        <div class="hdr-top">
          <div class="hdr-icon">🔧</div>
          <div class="hdr-info">
            <h1>机械革命14+ 诊断中枢</h1>
            <p id="hdrSub">步骤 1/10 · 总耗时 0秒</p>
          </div>
          <div class="hdr-timer" id="hdrTimer">
            <div class="t" id="stepTimer">0秒</div>
            <div class="l">本步计时</div>
          </div>
        </div>
        <div class="progress" id="progressBar"></div>
        <div class="nav" id="navBar"></div>
      </div>

      <div class="content" id="mainContent"></div>
    </div>

    <script>
      // ════════════════ Data ════════════════
      const TREE = [
        {
          id: 0,
          title: "释放静电",
          icon: "⚡",
          tag: "零成本",
          time: "1分钟",
          instruction: [
            "❶ 关机 → 长按电源键10秒强制关机",
            "❷ 拔掉电源适配器",
            "❸ 拔掉所有外接设备（USB/Type-C/HDMI全拔）",
            "❹ 长按电源键 20~30秒",
            "❺ 松手，等10秒",
            "❻ 仅插电源适配器",
            "❼ 按电源键开机",
          ],
          ask: "释放静电后能正常开机了吗？",
          yes: {
            text: "能开机了！",
            next: "done",
            msg: "🎉 静电问题已解决！建议检查接地线和用电环境。",
          },
          no: { text: "还是不行", next: 1, msg: "排除静电，继续下一步。" },
          tip: "机械革命CODE01实测：释放静电后直接恢复！成功率极高。",
        },
        {
          id: 1,
          title: "检查电源适配器",
          icon: "🔌",
          tag: "零成本",
          time: "2分钟",
          instruction: [
            "❶ 检查适配器指示灯是否亮",
            "❷ 检查电源线有无破损/折痕",
            "❸ 检查DC/Type-C充电口是否松动、有异物",
            "❹ 如有条件，换一个同规格适配器试试",
            "❺ 插电后，开机键旁的灯有反应吗？",
          ],
          ask: "插上电源适配器后，有任何灯亮或风扇转吗？",
          yes: { text: "有反应", next: 2, msg: "电源OK，问题在别处。" },
          no: {
            text: "完全没反应",
            next: 5,
            msg: "可能是电源/主板供电回路问题。需要拆机检查。",
          },
          maybe: { text: "灯闪一下就灭", next: 3, msg: "典型电池或主板问题。" },
          warning: "确保使用原装或同规格适配器（100W USB-C PD 或 DC口）",
        },
        {
          id: 2,
          title: "观察关机时机",
          icon: "⏱️",
          tag: "观察",
          time: "2分钟",
          instruction: [
            "现在按电源键开机，用手机计时：",
            "",
            "❶ 按下电源键的那一刻 → 开始计时",
            "❷ 电脑彻底灭掉 → 停止计时",
            "❸ 同时观察：",
            "   • 屏幕有没有亮过？",
            "   • 风扇有没有转过？",
            '   • 有没有听到"嘎达"声？',
          ],
          ask: "从按下电源到灭掉，大约几秒？",
          yes: {
            text: "< 10秒",
            next: 3,
            msg: "极短时间关机 → 硬件级问题（电源键/短路/内存）。",
          },
          no: {
            text: "10秒~1分钟",
            next: 4,
            msg: "中等时间 → 可能是内存/BIOS/供电问题。",
          },
          maybe: {
            text: "> 1分钟 / 能看到画面",
            next: 7,
            msg: "能到系统层面 → 可能是驱动/散热/软件问题。",
          },
        },
        {
          id: 3,
          title: "检查开机按键",
          icon: "🔘",
          tag: "零成本",
          time: "1分钟",
          instruction: [
            "开关短路一次=开机，再次短路=关机",
            "如果按钮持续短路 → 开了又关",
            "",
            "❶ 按开机键时，注意手感是否粘滞/不回弹",
            "❷ 尝试快速轻按（不要长按）",
            "❸ 观察按键是否有异物/卡住",
            "❹ 如有压缩空气，对准按键周围吹",
          ],
          ask: "按键手感正常吗？快速轻按后有改善吗？",
          yes: {
            text: "按键正常，没改善",
            next: 4,
            msg: "排除按键问题，进入拆机排查。",
          },
          no: {

      let timerInterval = null;

      function uid() {
        return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
      }
      function now() {
        const d = new Date();
        return [d.getHours(), d.getMinutes(), d.getSeconds()]
          .map((n) => String(n).padStart(2, "0"))
          .join(":");
      }
      function fmt(ms) {
        const s = Math.floor(ms / 1000);
        return s < 60 ? s + "秒" : Math.floor(s / 60) + "分" + (s % 60) + "秒";
      }

      function save() {
        try {
          localStorage.setItem(
            "agent_diag",
            JSON.stringify({
              steps: state.steps,
              log: state.log,
              cur: state.cur,
              done: state.done,
              doneMsg: state.doneMsg,
            }),
          );
        } catch (e) {}
      }
      function load() {
        try {
          const d = JSON.parse(localStorage.getItem("agent_diag"));
          if (d) {
            if (d.steps) state.steps = d.steps;
            if (d.log) state.log = d.log;
            if (d.cur !== undefined) state.cur = d.cur;
            if (d.done) {
              state.done = true;
              state.doneMsg = d.doneMsg || "";
            }
          }
        } catch (e) {}
      }

      function addLog(type, text, step, photo) {
        state.log.push({ id: uid(), time: now(), type, text, step, photo });
        save();

      // ════════════════ Render ════════════════
      function render() {
        renderHeader();
        renderProgress();
        renderNav();
        const el = document.getElementById("mainContent");
        el.innerHTML = "";
        el.className = "content fade-in";
        if (state.view === "wizard") renderWizard(el);
        else if (state.view === "log") renderLog(el);
        else if (state.view === "camera") renderCamera(el);
        else if (state.view === "specs") renderSpecs(el);
        else if (state.view === "report") renderReport(el);
        save();
      }

      function renderHeader() {
        const n = TREE[state.cur];
        const done = Object.values(state.steps).filter(
          (s) => s.status === "done",
        ).length;
        document.getElementById("hdrSub").textContent = state.done
          ? "✅ 诊断完成"
          : `步骤 ${state.cur + 1}/${TREE.length} · 总耗时 ${fmt(Date.now() - state.sessionStart)}`;
        document.getElementById("hdrTimer").style.display = state.done
          ? "none"
          : "";
      }

      function renderProgress() {
        const el = document.getElementById("progressBar");
        el.innerHTML = TREE.map((_, i) => {
          const s = state.steps[i];
          let cls = "bar";
          if (s && s.status === "done") {
            cls +=
              " done-" +
              (s.result === "success"
                ? "ok"
                : s.result === "fail"
                  ? "fail"
                  : "maybe");
          } else if (i === state.cur && !state.done) {
            cls += " active";
          }
          return `<div class="${cls}"></div>`;
        }).join("");
      }

      function renderNav() {
        const el = document.getElementById("navBar");
        el.innerHTML = VIEWS.map(([v, icon, label]) => {
          let badge = "";
          if (v === "log" && state.log.length > 0)
            badge = `<span class="badge">${state.log.length}</span>`;
          return `<button class="${state.view === v ? "on" : ""}" onclick="switchView('${v}')">${icon} ${label}${badge}</button>`;
        }).join("");
      }

      function switchView(v) {
        state.view = v;
        render();
      }

      function renderWizard(el) {
        if (state.done) return renderDone(el);
        const n = TREE[state.cur];
        if (!state.steps[state.cur]) {
          state.steps[state.cur] = {
            status: "active",
            notes: "",
            startTime: Date.now(),
          };
          addLog("system", `开始: ${n.title}`, state.cur);
        }
        // Step header
        let h = `<div class="card card-accent"><div class="step-hdr"><span class="icon">${n.icon}</span><div><h2>${n.title}</h2><div class="tags"><span class="tag">${n.tag}</span><span class="tag">⏱ ${n.time}</span></div></div></div></div>`;
        // Instructions
        h += `<div class="card"><p class="instr-title">操作步骤</p><div class="instr">`;
        n.instruction.forEach((line) => {
          if (line === "") h += '<p class="empty"></p>';
          else if (/^[❶❷❸❹❺❻❼]/.test(line))
            h += `<p class="step-line">${esc(line)}</p>`;
          else if (line.startsWith("   "))
            h += `<p class="indent">${esc(line)}</p>`;
          else h += `<p>${esc(line)}</p>`;
        });
        h += "</div></div>";
        // Tip/Warning
        if (n.tip)
          h += `<div class="tip tip-green"><p>💡 ${esc(n.tip)}</p></div>`;
        if (n.warning)
          h += `<div class="tip tip-amber"><p>⚠️ ${esc(n.warning)}</p></div>`;
        // Photo
        if (n.photo)
          h += `<button class="photo-btn" onclick="takePhoto()">📸 拍照记录（可选）</button>`;

        h += `<div class="note-row"><input id="noteInput" placeholder="记录观察到的现象..." onkeydown="if(event.key==='Enter')addNote()"><button onclick="addNote()">记录</button></div>`;

        h += `<div class="card"><p class="question">${esc(n.ask)}</p>`;
        h += `<button class="ans-btn ans-yes" onclick="answer('yes')">✅ ${esc(n.yes.text)}</button>`;
        h += `<button class="ans-btn ans-no" onclick="answer('no')">❌ ${esc(n.no.text)}</button>`;
        if (n.maybe)
          h += `<button class="ans-btn ans-maybe" onclick="answer('maybe')">🤔 ${esc(n.maybe.text)}</button>`;
        h += "</div>";
        el.innerHTML = h;

      function renderDone(el) {
        const doneSteps = Object.entries(state.steps)

              mark = "✓";
              mc = "#4ade80";
            } else if (s.result === "fail") {
              mark = "✗";
              mc = "#f87171";
            } else if (s.result === "unclear") {
              mark = "?";
              mc = "#fbbf24";
            } else {
              mc = "#6b7280";
            }
          }
          h += `<div class="report-step"><span class="mark" style="color:${mc}">${mark}</span><span class="name" style="color:${s ? "#d1d5db" : "#374151"}">${n.icon} ${n.title}</span><span class="elapsed">${s && s.elapsed ? fmt(s.elapsed) : "--"}</span></div>`;
        });
        h += "</div>";
        const findings = state.log.filter(
          (e) => e.type === "finding" || e.type === "note",
        );
        if (findings.length > 0) {
          h += `<div class="card"><h3 style="font-size:.75rem;font-weight:700;color:#fff;margin-bottom:.5rem">关键发现</h3>`;
          findings.forEach((e) => {
            h += `<p class="finding-line"><span class="ftime">${e.time}</span> ${esc(e.text)}</p>`;
          });
          h += "</div>";
        }
        const photos = state.log.filter((e) => e.photo);
        if (photos.length > 0) {
          h += `<div class="card"><h3 style="font-size:.75rem;font-weight:700;color:#fff;margin-bottom:.5rem">照片证据 (${photos.length})</h3><div class="photo-gallery">`;
          photos.forEach((e) => {
            h += `<img src="${e.photo}" alt="" style="height:6rem">`;
          });
          h += "</div></div>";
        }
        if (state.done && state.doneMsg) {
          h += `<div class="card card-green"><h3 style="font-size:.75rem;font-weight:700;color:#86efac;margin-bottom:.25rem">最终结论</h3><p style="font-size:.875rem;color:#d1d5db">${esc(state.doneMsg)}</p></div>`;
        }
        el.innerHTML = h;
      }

      // ════════════════ Actions ════════════════
      function answer(choice) {
        const n = TREE[state.cur];
        const opt = n[choice];
        if (!opt) return;
        const elapsed =
          Date.now() - (state.steps[state.cur]?.startTime || Date.now());
        state.steps[state.cur] = {
          ...state.steps[state.cur],
          status: "done",
          result:
            choice === "yes" ? "success" : choice === "no" ? "fail" : "unclear",
          elapsed,
        };
        addLog("finding", `${n.title} → ${opt.text}`, state.cur);
        addLog("system", opt.msg, state.cur);
        if (opt.next === "done") {
          state.done = true;
          state.doneMsg = opt.msg;
        } else {
          state.cur = opt.next;
        }
        render();
      }

      function addNote() {
        const input = document.getElementById("noteInput");
        if (!input || !input.value.trim()) return;
        const text = input.value.trim();
        addLog("note", text, state.cur);
        const s = state.steps[state.cur];
        if (s) s.notes = (s.notes || "") + "\n" + text;
        input.value = "";
        save();
      }

      function takePhoto() {
        document.getElementById("fileInput").click();
      }

      document
        .getElementById("fileInput")
        .addEventListener("change", function (e) {
          const file = e.target.files && e.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = function (ev) {
            const n = TREE[state.cur];
            addLog(
              "photo",
              (n ? n.title : "") + "- 拍照记录",
              state.cur,
              ev.target.result,
            );
            if (state.view === "camera" || state.view === "wizard") render();
          };
          reader.readAsDataURL(file);
          e.target.value = "";
        });

      function clearLog() {
        state.log = [];
        save();
        render();
      }
      function resetAll() {
        state = {
          view: "wizard",
          cur: 0,
          steps: {},
          log: [],
          done: false,
          doneMsg: "",
          sessionStart: Date.now(),
        };
        localStorage.removeItem("agent_diag");
        render();
      }

      function esc(s) {
        return s
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      // ════════════════ Timer ════════════════
      function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
          const s = state.steps[state.cur];
          if (s && s.status === "active" && !state.done) {
            document.getElementById("stepTimer").textContent = fmt(
              Date.now() - s.startTime,
            );
          }
          // Update header sub text
          const done = Object.values(state.steps).filter(
            (x) => x.status === "done",
          ).length;
          document.getElementById("hdrSub").textContent = state.done
            ? "✅ 诊断完成"
            : `步骤 ${state.cur + 1}/${TREE.length} · 总耗时 ${fmt(Date.now() - state.sessionStart)}`;
        }, 1000);
      }

      // ════════════════ Init ════════════════
      load();
      render();
      startTimer();
    </script>
  </body>
</html>
